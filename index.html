<!--
米仓小记 V1.4.0.4
迭代内容：仅新增第二套【时段连续摊销】核算模式，暂不加入打卡模式
修复：统计页/时段页点击分类不再跳回台账主页，仅本地筛选
页面结构：时段台账｜物品台账｜成本统计
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>米仓小记 V1.4.0.4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
body{background:#fff9e6;padding:16px;padding-bottom:70px;min-height:100vh;}

/* 搜索模块 */
.search-icon{width:24px;height:24px;fill:#333;cursor:pointer;margin-left:auto;margin-bottom:16px;display:block;}
.search-wrap{display:none;gap:8px;margin-bottom:16px;}
#searchInput{flex:1;padding:10px 12px;border:1px solid #e2d2b0;border-radius:8px;background:#fff;font-size:15px;}
#searchImgBtn{padding:0 14px;background:#b89650;color:#fff;border:none;border-radius:8px;cursor:pointer;}

/* 动态分类栏 + 自定义输入区域 */
.category-wrap{margin-bottom:16px;}
.category-tab{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;}
.category-tab::-webkit-scrollbar{height:3px;}
.tab-item{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid #d4c3a3;background:#fff;color:#6b5427;font-size:14px;white-space:nowrap;cursor:pointer;user-select:none;}
.tab-item.active{background:#b89650;color:#fff;border-color:#b89650;}
/* 自定义分类输入框 */
.custom-cate-input-wrap{display:flex;gap:8px;align-items:center;}
#customCateInput{flex:1;padding:8px 12px;border:1px solid #d4c3a3;border-radius:20px;background:#fff;font-size:14px;outline:none;}

/* 头部操作区 */
.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.main-header h1{font-size:26px;color:#6b5427;}
#addGoodsBtn,#addTimeBtn{padding:9px 16px;background:#7d6432;color:#fff;border:none;border-radius:8px;cursor:pointer;}

/* 物品卡片容器 */
.goods-container{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.empty-tip{grid-column:1/-1;text-align:center;padding:60px 20px;color:#999;font-size:15px;}
.goods-card{background:#fff;padding:14px;border-radius:10px;box-shadow:0 2px 6px rgba(120,90,40,0.12);cursor:pointer;}
.card-img{width:100%;height:110px;object-fit:cover;border-radius:6px;background:#f3eddb;margin-bottom:10px;}
.card-name{font-weight:500;color:#333;margin-bottom:4px;}
.card-cate{font-size:12px;color:#b89650;margin-bottom:4px;}
.card-cost{font-size:13px;color:#886c3b;line-height:1.4;}

/* 新增/编辑弹窗 模式分区显隐 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;padding:16px;z-index:998;}
.modal-box{width:100%;max-width:420px;background:#fff;padding:22px;border-radius:12px;max-height:85vh;overflow-y:auto;}
.modal-box h3{color:#6b5427;margin-bottom:18px;}
.form-item{margin-bottom:14px;}
label{display:block;font-size:14px;margin-bottom:5px;color:#555;}
input[type="text"],input[type="number"],select,input[type="date"]{width:100%;padding:10px;border:1px solid #e2d2b0;border-radius:7px;}
.year-month-row{display:flex;gap:6px;margin-top:6px;}
.year-month-row input{flex:1;}
/* 两种核算模式区块，默认隐藏 */
.mode-normal,.mode-time{display:none;}
.mode-normal.show,.mode-time.show{display:block;}
.upload-switch{display:flex;gap:8px;margin-bottom:8px;}
.switch-btn{flex:1;padding:8px;border:1px solid #d4c3a3;background:#fff;border-radius:6px;text-align:center;cursor:pointer;font-size:14px;}
.switch-btn.active{background:#b89650;color:#fff;border-color:#b89650;}
.upload-area{display:flex;align-items:center;gap:10px;}
.upload-circle{width:40px;height:40px;border:2px solid #b89650;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#b89650;font-size:20px;font-weight:bold;cursor:pointer;}
#fileUpload,#cameraUpload{display:none;}
.modal-btns{display:flex;gap:10px;margin-top:22px;}
.save-btn{flex:1;padding:11px;border:none;border-radius:7px;background:#b89650;color:#fff;cursor:pointer;}
.cancel-btn{flex:1;padding:11px;border:1px solid #d4c3a3;background:#fff;border-radius:7px;cursor:pointer;}
.del-goods-btn{width:100%;margin-top:10px;padding:11px;background:#c45141;color:#fff;border:none;border-radius:7px;cursor:pointer;display:none;}

/* 统计页面样式 */
.stat-page{display:none;}
.time-page{display:none;}
.goods-page{display:none;}
.page.active{display:block;}
.stat-header{margin-bottom:16px;}
.stat-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.stat-filter-tag{padding:6px 12px;border:1px solid #d4c3a3;border-radius:16px;font-size:13px;cursor:pointer;}
.stat-filter-tag.active{background:#b89650;color:#fff;border-color:#b89650;}
.stat-total-box{background:#fff;padding:14px;border-radius:10px;margin-bottom:16px;}
.stat-total-text{font-size:16px;color:#6b5427;}
.stat-total-num{font-size:22px;font-weight:bold;color:#b89650;margin-top:6px;}
.stat-select-bar{display:flex;gap:10px;margin-bottom:12px;}
.stat-select-btn{padding:7px 14px;background:#fff;border:1px solid #d4c3a3;border-radius:6px;color:#6b5427;cursor:pointer;}
.stat-item-list{display:flex;flex-direction:column;gap:8px;}
.stat-item-row{display:flex;align-items:center;gap:10px;background:#fff;padding:12px;border-radius:8px;}
.stat-item-info{flex:1;}
.stat-item-name{font-weight:500;color:#333;}
.stat-item-cate{font-size:13px;color:#886c3b;margin-top:3px;}

/* 底部导航容器 + 右下角猫咪悬浮按钮 */
.tab-nav-wrapper{position:fixed;bottom:0;left:0;width:100%;height:54px;z-index:999;pointer-events:none;}
.tab-trigger{position:fixed;bottom:4px;right:10px;width:60px;height:60px;cursor:pointer;z-index:1001;pointer-events:auto;transition:opacity 0.24s ease;}
.tab-trigger.hide-cat{opacity:0;pointer-events:none;}
.tab-trigger svg{width:100%;height:100%;opacity:0.85;}
.tab-nav{display:flex;justify-content:space-around;background:#fff;border-top:1px solid #e2d2b0;height:54px;width:100%;position:absolute;bottom:0;left:0;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);pointer-events:auto;}
.tab-nav.show-nav{transform:translateY(0);}
.nav-item{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999;font-size:13px;gap:3px;cursor:pointer;}
.nav-item.active{color:#b89650;font-weight:500;}
.nav-item svg{width:22px;height:22px;fill:currentColor;}
</style>
</head>
<body>
<!-- 搜索模块 -->
<svg class="search-icon" id="searchToggle" viewBox="0 0 24 24">
<path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>

<button id="searchImgBtn">搜图</button>
</div>

<!-- 全局分类输入区域 -->
<div class="category-wrap">
<div class="category-tab" id="cateTab"></div>
<div class="custom-cate-input-wrap">
<input type="text" id="customCateInput" placeholder="输入自定义分类名称，回车添加">
</div>
</div>

<!-- 1. 物品台账页面（原版时长模式） -->
<div class="goods-page page active" id="goodsPage">
<div class="main-header">
<h1>物品台账</h1>
<button id="addGoodsBtn">添加物品</button>
</div>
<div class="goods-container" id="goodsBox"></div>
</div>

<!-- 2. 时段台账页面（第二套：时段连续摊销模式） -->
<div class="time-page page" id="timePage">
<div class="main-header">
<h1>时段台账</h1>
<button id="addTimeBtn">添加物品</button>
</div>
<div class="goods-container" id="timeBox"></div>
</div>

<!-- 3. 成本统计页面 -->
<div class="stat-page page" id="statPage">
<div class="stat-header">
<h1>成本统计</h1>
</div>
<div class="stat-filter-bar">
<div class="stat-filter-tag active" data-filter="all">全部分类</div>
</div>
<div class="stat-total-box">
<div class="stat-total-text">选中物品平均损耗成本</div>
<div class="stat-total-num" id="totalCostShow">0.00 元</div>
</div>
<div class="stat-select-bar">
<button class="stat-select-btn" id="selectAllBtn">全选</button>
<button class="stat-select-btn" id="cancelAllBtn">取消全选</button>
</div>
<div class="stat-item-list" id="statListBox"></div>
</div>

<!-- 新增/编辑物品弹窗（双核算模式切换） -->
<div class="modal-mask" id="editModal">
<div class="modal-box">
<h3 id="modalTitle">添加物品</h3>
<input type="hidden" id="editId">
<input type="hidden" id="bindMode">
<div class="form-item">
<label>物品名称</label>
<input type="text" id="nameInput" placeholder="填写物品名称">
</div>
<div class="form-item">
<label>物品分类</label>
<select id="cateSelect"></select>
</div>
<div class="form-item">
<label>物品图片</label>
<div class="upload-switch">
<div class="switch-btn active" data-type="album">相册上传</div>
<div class="switch-btn" data-type="camera">立即拍照</div>
</div>
<div class="upload-area">
<div class="upload-circle" id="uploadTrigger">+</div>
<span id="fileTip">未选择图片</span>
<input type="file" id="fileUpload" accept="image/*">
<input type="file" id="cameraUpload" accept="image/*" capture="environment">
</div>
</div>
<div class="form-item">
<label>购入总价（元）</label>
<input type="number" step="0.01" id="priceInput" placeholder="0.00">
</div>

<!-- 原版通用时长模式字段 -->
<div class="mode-normal" id="modeNormal">
<div class="form-item">
<label>预估最少可用时长</label>
<div class="year-month-row">
<input type="number" id="minYear" placeholder="年" min="0">
<input type="number" id="minMonth" placeholder="月" min="0">
<input type="number" id="minDay" placeholder="天" min="0">
</div>
</div>
<div class="form-item">
<label>预估最多可用时长（选填）</label>
<div class="year-month-row">
<input type="number" id="maxYear" placeholder="年" min="0">
<input type="number" id="maxMonth" placeholder="月" min="0">
<input type="number" id="maxDay" placeholder="天" min="0">
</div>
</div>
</div>

<!-- 第二套 时段摊销专属字段 -->
<div class="mode-time" id="modeTime">
<div class="form-item">
<label>使用起始日期</label>
<input type="date" id="startDate">
</div>
<div class="form-item">
<p style="color:#886c3b;font-size:13px;">截止自动为今日，自动计算真实日均损耗</p>
</div>
<div class="form-item">
<label>预估最少可用时长（参考）</label>
<div class="year-month-row">
<input type="number" id="timeMinYear" placeholder="年" min="0">
<input type="number" id="timeMinMonth" placeholder="月" min="0">
<input type="number" id="timeMinDay" placeholder="天" min="0">
</div>
</div>
<div class="form-item">
<label>预估最多可用时长（参考，选填）</label>
<div class="year-month-row">
<input type="number" id="timeMaxYear" placeholder="年" min="0">
<input type="number" id="timeMaxMonth" placeholder="月" min="0">
<input type="number" id="timeMaxDay" placeholder="天" min="0">
</div>
</div>
</div>

<div class="modal-btns">
<button class="save-btn" id="saveBtn">保存</button>
<button class="cancel-btn" id="cancelBtn">取消</button>
</div>
<button class="del-goods-btn" id="delBtn">删除该物品</button>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
const STORAGE_KEY = "micang_v13_data";
const CATE_STORAGE_KEY = "micang_custom_cates";
const TODAY = new Date().toISOString().split('T')[0];
// 预设基础分类（不可删除）
const BASE_CATE_LIST = ["数码","美妆","电器","文具","百货","医药","服装","鞋包","饰品","车","家具"];
let userCustomCates = JSON.parse(localStorage.getItem(CATE_STORAGE_KEY)) || [];
// 物品结构新增bindMode: normal / time
let goodsArr = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let tempImgData = "";
let uploadMode = "album";
let selectedStatIds = new Set();
let currentActivePage = "goodsPage";

// 搜索开关逻辑
const searchToggle = document.getElementById("searchToggle");
const searchBox = document.getElementById("searchBox");
searchToggle.addEventListener("click", () => {
searchBox.style.display = searchBox.style.display === "flex" ? "none" : "flex";
});
document.getElementById("searchImgBtn").addEventListener("click", () => {
const key = document.getElementById("searchInput").value.trim();
if(!key) return alert("请输入物品名称");
window.open(`https://image.baidu.com/search/index?tn=baiduimage&word=${encodeURIComponent(key)}`);
});

// 自定义分类输入回车新增
const customCateInput = document.getElementById("customCateInput");
customCateInput.addEventListener("keydown", (e) => {
if(e.key === "Enter"){
const inputVal = e.target.value.trim();
if(!inputVal) return;
const allCates = [...BASE_CATE_LIST, ...userCustomCates];
if(allCates.includes(inputVal)){
alert("该分类已存在");
return;
}
userCustomCates.push(inputVal);
localStorage.setItem(CATE_STORAGE_KEY, JSON.stringify(userCustomCates));
customCateInput.value = "";
renderCateTab();
renderCateSelect();
}
});

// 全部分类集合
function getAllCateList(){
return [...BASE_CATE_LIST, ...userCustomCates];
}

// 渲染分类标签栏（修复：点击分类不切页面，仅筛选当前页）
function renderCateTab(){
const tabWrap = document.getElementById("cateTab");
tabWrap.innerHTML = "";
const allCates = getAllCateList();
const countMap = {};
allCates.forEach(c => countMap[c] = 0);
goodsArr.forEach(item => countMap[item.category]++);
const sortedCates = ["全部", ...allCates.sort((a,b)=>countMap[b]-countMap[a])];
sortedCates.forEach(cate => {
const div = document.createElement("div");
div.className = "tab-item" + (cate === "全部" ? " active" : "");
div.dataset.cate = cate;
div.innerText = cate;
// 点击仅筛选当前页面，不再强制切回台账
div.addEventListener("click", () => {
document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
div.classList.add("active");
switch(currentActivePage){
case "goodsPage": renderGoodsList(); break;
case "timePage": renderTimeList(); break;
case "statPage": renderStatPage(); break;
}
});
// 长按删除自定义分类（基础分类禁止删除）
let longPressTimer = null;
div.addEventListener("mousedown", ()=>{
longPressTimer = setTimeout(()=>{
if(BASE_CATE_LIST.includes(cate)){
alert("基础预设分类不可删除");
return;
}
if(confirm(`确定删除分类「${cate}」？该分类下物品不会被删除，仅移除分类标签`)){
userCustomCates = userCustomCates.filter(c=>c!==cate);
localStorage.setItem(CATE_STORAGE_KEY, JSON.stringify(userCustomCates));
renderCateTab();
renderCateSelect();
}
}, 800);
});
div.addEventListener("mouseup", ()=>clearTimeout(longPressTimer));
div.addEventListener("mouseleave", ()=>clearTimeout(longPressTimer));
div.addEventListener("touchstart", ()=>{
longPressTimer = setTimeout(()=>{
if(BASE_CATE_LIST.includes(cate)){
alert("基础预设分类不可删除");
return;
}
if(confirm(`确定删除分类「${cate}」？该分类下物品不会被删除，仅移除分类标签`)){
userCustomCates = userCustomCates.filter(c=>c!==cate);
localStorage.setItem(CATE_STORAGE_KEY, JSON.stringify(userCustomCates));
renderCateTab();
renderCateSelect();
}
}, 800);
});
div.addEventListener("touchend", ()=>clearTimeout(longPressTimer));
div.addEventListener("touchcancel", ()=>clearTimeout(longPressTimer));
tabWrap.appendChild(div);
});
}

// 弹窗下拉分类
function renderCateSelect(){
const cateSelect = document.getElementById("cateSelect");
cateSelect.innerHTML = "";
getAllCateList().forEach(cate => {
const opt = document.createElement("option");
opt.value = cate;
opt.innerText = cate;
cateSelect.appendChild(opt);
});
}

// 日期转总天数
function dateToDay(dateStr){
if(!dateStr) return 0;
const s = new Date(dateStr);
const t = new Date(TODAY);
const diff = Math.floor((t - s) / (1000 * 60 * 60 * 24));
return diff >= 0 ? diff : 0;
}
function calcTotalDay(y,m,d){
return (Number(y)||0)*365 + (Number(m)||0)*30 + (Number(d)||0);
}

// 切换全局页面
function switchPage(pageId){
currentActivePage = pageId;
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(pageId).classList.add("active");
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add("active");
renderCateTab();
if(pageId === "goodsPage") renderGoodsList();
if(pageId === "timePage") renderTimeList();
if(pageId === "statPage") renderStatPage();
}

// 渲染原版台账列表 bindMode = normal
function renderGoodsList(){
const box = document.getElementById("goodsBox");
box.innerHTML = "";
const activeCate = document.querySelector(".tab-item.active").dataset.cate;
let renderList = goodsArr.filter(i=>i.bindMode==="normal");
if(activeCate !== "全部") renderList = renderList.filter(i => i.category === activeCate);
if(renderList.length === 0){
box.innerHTML = `<div class="empty-tip">暂无通用台账物品</div>`;
return;
}
renderList.forEach(item => {
const minDay = calcTotalDay(item.minYear, item.minMonth, item.minDay);
const minAvg = minDay > 0 ? (Number(item.price)/minDay).toFixed(2) : "时长未填";
const maxDay = calcTotalDay(item.maxYear, item.maxMonth, item.maxDay);
let costText = `日均最低 ${minAvg} 元`;
if(maxDay > 0){
const maxAvg = (Number(item.price)/maxDay).toFixed(2);
costText = `日均 ${minAvg} ~ ${maxAvg} 元`;
}
const card = document.createElement("div");
card.className = "goods-card";
card.innerHTML = `
<img class="card-img" src="${item.img||''}" alt="">
<div class="card-name">${item.name}</div>
<div class="card-cate">${item.category}</div>
<div class="card-cost">${costText}</div>
`;
card.addEventListener("click", () => openEditModal(item.id));
box.appendChild(card);
});
}

// 渲染时段台账列表 bindMode = time
function renderTimeList(){
const box = document.getElementById("timeBox");
box.innerHTML = "";
const activeCate = document.querySelector(".tab-item.active").dataset.cate;
let renderList = goodsArr.filter(i=>i.bindMode==="time");
if(activeCate !== "全部") renderList = renderList.filter(i => i.category === activeCate);
if(renderList.length === 0){
box.innerHTML = `<div class="empty-tip">暂无时段摊销物品</div>`;
return;
}
renderList.forEach(item => {
const realDay = dateToDay(item.startDate);
const realAvg = realDay > 0 ? (Number(item.price)/realDay).toFixed(2) : "未开始使用";
const minRefDay = calcTotalDay(item.timeMinYear, item.timeMinMonth, item.timeMinDay);
const minRefAvg = minRefDay>0 ? (Number(item.price)/minRefDay).toFixed(2) : "";
let costText = `真实日均损耗：${realAvg} 元`;
if(minRefAvg) costText += `｜预估最低日均 ${minRefAvg} 元`;
const card = document.createElement("div");
card.className = "goods-card";
card.innerHTML = `
<img class="card-img" src="${item.img||''}" alt="">
<div class="card-name">${item.name}</div>
<div class="card-cate">${item.category}</div>
<div class="card-cost">${costText}</div>
`;
card.addEventListener("click", () => openEditModal(item.id));
box.appendChild(card);
});
}

// 渲染统计页面（修复跨页分类筛选）
function renderStatPage(){
selectedStatIds.clear();
const listBox = document.getElementById("statListBox");
listBox.innerHTML = "";
const activeCate = document.querySelector(".tab-item.active").dataset.cate;
let renderList = [...goodsArr];
if(activeCate !== "全部") renderList = goodsArr.filter(i => i.category === activeCate);
renderList.forEach(item=>{
const row = document.createElement("div");
row.className = "stat-item-row";
row.dataset.id = item.id;
let showAvg = "";
if(item.bindMode === "normal"){
const d = calcTotalDay(item.minYear,item.minMonth,item.minDay);
showAvg = d>0 ? (Number(item.price)/d).toFixed(2) : "无时长";
}else{
const d = dateToDay(item.startDate);
showAvg = d>0 ? (Number(item.price)/d).toFixed(2) : "未启用";
}
row.innerHTML = `
<input type="checkbox" class="stat-check">
<div class="stat-item-info">
<div class="stat-item-name">${item.name}（${item.bindMode==="time"?"时段摊销":"通用时长"}）</div>
<div class="stat-item-cate">分类：${item.category}｜日均损耗${showAvg}元</div>
</div>
`;
const check = row.querySelector(".stat-check");
check.addEventListener("change", ()=>{
if(check.checked) selectedStatIds.add(item.id);
else selectedStatIds.delete(item.id);
calcStatTotal();
});
listBox.appendChild(row);
});
calcStatTotal();
}
// 统计合计计算
function calcStatTotal(){
let totalAvg = 0;
selectedStatIds.forEach(id=>{
const item = goodsArr.find(g=>g.id===id);
if(!item) return;
let day = 0;
if(item.bindMode === "normal") day = calcTotalDay(item.minYear,item.minMonth,item.minDay);
if(item.bindMode === "time") day = dateToDay(item.startDate);
if(day>0) totalAvg += Number(item.price)/day;
});
document.getElementById("totalCostShow").innerText = totalAvg.toFixed(2)+" 元";
}
// 全选/取消全选统计
document.getElementById("selectAllBtn").addEventListener("click",()=>{
goodsArr.forEach(i=>selectedStatIds.add(i.id));
renderStatPage();
});
document.getElementById("cancelAllBtn").addEventListener("click",()=>{
selectedStatIds.clear();
renderStatPage();
});

// 弹窗DOM缓存
const editModal = document.getElementById("editModal");
const modalTitle = document.getElementById("modalTitle");
const editId = document.getElementById("editId");
const bindModeInput = document.getElementById("bindMode");
const nameInput = document.getElementById("nameInput");
const cateSelect = document.getElementById("cateSelect");
const priceInput = document.getElementById("priceInput");
// 通用模式字段
const minYear = document.getElementById("minYear");
const minMonth = document.getElementById("minMonth");
const minDay = document.getElementById("minDay");
const maxYear = document.getElementById("maxYear");
const maxMonth = document.getElementById("maxMonth");
const maxDay = document.getElementById("maxDay");
// 时段模式字段
const startDate = document.getElementById("startDate");
const timeMinYear = document.getElementById("timeMinYear");
const timeMinMonth = document.getElementById("timeMinMonth");
const timeMinDay = document.getElementById("timeMinDay");
const timeMaxYear = document.getElementById("timeMaxYear");
const timeMaxMonth = document.getElementById("timeMaxMonth");
const timeMaxDay = document.getElementById("timeMaxDay");
// 模式区块
const modeNormal = document.getElementById("modeNormal");
const modeTime = document.getElementById("modeTime");
const fileTip = document.getElementById("fileTip");
const uploadTrigger = document.getElementById("uploadTrigger");
const fileUpload = document.getElementById("fileUpload");
const cameraUpload = document.getElementById("cameraUpload");
const delBtn = document.getElementById("delBtn");
const saveBtn = document.getElementById("saveBtn");
const cancelBtn = document.getElementById("cancelBtn");
const switchBtns = document.querySelectorAll(".switch-btn");

// 切换弹窗内核算模式区块
function switchModalMode(mode){
modeNormal.classList.remove("show");
modeTime.classList.remove("show");
if(mode === "normal") modeNormal.classList.add("show");
if(mode === "time") modeTime.classList.add("show");
bindModeInput.value = mode;
}

// 上传切换
switchBtns.forEach(btn => {
btn.addEventListener("click", () => {
switchBtns.forEach(b => b.classList.remove("active"));
btn.classList.add("active");
uploadMode = btn.dataset.type;
});
});
uploadTrigger.addEventListener("click", () => uploadMode === "album" ? fileUpload.click() : cameraUpload.click());
fileUpload.addEventListener("change", e => {
const f = e.target.files[0];
if(!f) return;
const reader = new FileReader();
reader.onload = ev => { tempImgData = ev.target.result; fileTip.innerText = f.name; };
reader.readAsDataURL(f);
});
cameraUpload.addEventListener("change", e => {
const f = e.target.files[0];
if(!f) return;
const reader = new FileReader();
reader.onload = ev => { tempImgData = ev.target.result; fileTip.innerText = "拍摄图片"; };
reader.readAsDataURL(f);
});

// 台账页添加物品
document.getElementById("addGoodsBtn").addEventListener("click", () => {
openEmptyModal("normal");
});
// 时段页添加物品
document.getElementById("addTimeBtn").addEventListener("click", () => {
openEmptyModal("time");
});
// 清空弹窗新建
function openEmptyModal(mode){
modalTitle.innerText = "添加物品";
editId.value = "";
nameInput.value = "";
cateSelect.value = "数码";
priceInput.value = "";
// 清空通用字段
minYear.value = "";minMonth.value = "";minDay.value = "";
maxYear.value = "";maxMonth.value = "";maxDay.value = "";
// 清空时段字段
startDate.value = TODAY;
timeMinYear.value = "";timeMinMonth.value = "";timeMinDay.value = "";
timeMaxYear.value = "";timeMaxMonth.value = "";timeMaxDay.value = "";
tempImgData = "";
fileTip.innerText = "未选择图片";
delBtn.style.display = "none";
switchModalMode(mode);
editModal.style.display = "flex";
}
// 打开编辑弹窗
function openEditModal(id){
const item = goodsArr.find(i => i.id === id);
if(!item) return;
modalTitle.innerText = "编辑物品";
editId.value = id;
bindModeInput.value = item.bindMode;
nameInput.value = item.name;
cateSelect.value = item.category;
priceInput.value = item.price;
// 通用数据
minYear.value = item.minYear||"";
minMonth.value = item.minMonth||"";
minDay.value = item.minDay||"";
maxYear.value = item.maxYear||"";
maxMonth.value = item.maxMonth||"";
maxDay.value = item.maxDay||"";
// 时段数据
startDate.value = item.startDate||TODAY;
timeMinYear.value = item.timeMinYear||"";
timeMinMonth.value = item.timeMinMonth||"";
timeMinDay.value = item.timeMinDay||"";
timeMaxYear.value = item.timeMaxYear||"";
timeMaxMonth.value = item.timeMaxMonth||"";
timeMaxDay.value = item.timeMaxDay||"";
tempImgData = item.img||"";
fileTip.innerText = tempImgData ? "已上传图片" : "未选择图片";
delBtn.style.display = "block";
switchModalMode(item.bindMode);
editModal.style.display = "flex";
}
// 关闭弹窗
cancelBtn.addEventListener("click", () => editModal.style.display = "none");
editModal.addEventListener("click", e => { if(e.target === editModal) editModal.style.display = "none"; });

// 保存物品
saveBtn.addEventListener("click", () => {
const name = nameInput.value.trim();
const cate = cateSelect.value;
const price = Number(priceInput.value);
const bindMode = bindModeInput.value;
if(!name || isNaN(price) || price <= 0) return alert("请填写有效名称与价格");
let goodsData = {
id: editId.value || Date.now().toString(),
bindMode, name, category:cate, price, img:tempImgData,
// 通用模式字段
minYear:minYear.value,minMonth:minMonth.value,minDay:minDay.value,
maxYear:maxYear.value,maxMonth:maxMonth.value,maxDay:maxDay.value,
// 时段模式字段
startDate:startDate.value,
timeMinYear:timeMinYear.value,timeMinMonth:timeMinMonth.value,timeMinDay:timeMinDay.value,
timeMaxYear:timeMaxYear.value,timeMaxMonth:timeMaxMonth.value,timeMaxDay:timeMaxDay.value
};
// 校验必填项
if(bindMode === "normal"){
const total = calcTotalDay(minYear.value,minMonth.value,minDay.value);
if(total <= 0) return alert("通用台账必须填写最少可用时长");
}
if(bindMode === "time"){
if(!startDate.value) return alert("时段台账必须选择使用起始日期");
}
if(editId.value){
const idx = goodsArr.findIndex(i => i.id === editId.value);
goodsArr[idx] = goodsData;
}else{
goodsArr.push(goodsData);
}
localStorage.setItem(STORAGE_KEY, JSON.stringify(goodsArr));
editModal.style.display = "none";
renderCateTab();
switchPage(currentActivePage);
});

// 删除物品
delBtn.addEventListener("click", () => {
if(!confirm("确定删除该物品？删除后无法恢复")) return;
goodsArr = goodsArr.filter(i => i.id !== editId.value);
localStorage.setItem(STORAGE_KEY, JSON.stringify(goodsArr));
editModal.style.display = "none";
renderCateTab();
switchPage(currentActivePage);
});

// 右下角猫咪导航逻辑
const tabTrigger = document.getElementById("tabTrigger");
const tabNav = document.getElementById("tabNav");
let navHideTimer = null;
function showBottomNav(){
tabNav.classList.add("show-nav");
tabTrigger.classList.add("hide-cat");
clearTimeout(navHideTimer);
navHideTimer = setTimeout(hideBottomNav, 2000);
}
function hideBottomNav(){
tabNav.classList.remove("show-nav");
tabTrigger.classList.remove("hide-cat");
clearTimeout(navHideTimer);
}
tabTrigger.addEventListener("click", showBottomNav);
tabTrigger.addEventListener("touchstart", showBottomNav);
tabNav.addEventListener("click", () => {
clearTimeout(navHideTimer);
navHideTimer = setTimeout(hideBottomNav, 2000);
});

// 底部页面切换
const navItems = document.querySelectorAll(".nav-item");
navItems.forEach(item => {
item.addEventListener("click", () => {
const page = item.dataset.page;
switchPage(page);
});
});

// 初始化
renderCateSelect();
renderCateTab();
switchPage("goodsPage");
})
</script>
</body>
</html>
